<!DOCTYPE html>
<html lang="en">
<head>
<script>
  // Caulis moved off GitHub Pages to its own domain.
  //
  // The old origin has no ordering constraint to protect — it only gathers
  // and redirects, nothing here reads the result back — so it can safely
  // use a normal async fetch to mint a short token from the backend rather
  // than ever putting the raw payload in a URL (a long enough URL trips an
  // iOS "address invalid" error regardless of whether a human pasted it or
  // location.replace() set it directly). The sync XHR below, on the *new*
  // domain, is the one that actually has to block: app.jsx's initial
  // useState() reads localStorage synchronously at mount, so redemption has
  // to finish before any later <script> tag runs.
  //
  // Bulky/re-derivable local caches (plant list, photos, AI cache) are left
  // behind — they resync fresh from the backend once the garden key/password
  // carry over.
  //
  // Installed PWA (standalone): a silent redirect here doesn't fix anything
  // long-term — the home-screen icon's start_url is fixed at install time to
  // the old origin, so it would just show this same page again on every
  // launch. No web API lets a page uninstall itself, so send it to a static
  // page that explains the one-time manual step instead.
  if (location.hostname !== 'caulis.czeddaru.dev') {
    (async () => {
      const skip = new Set(['caulis_plants', 'caulis_queue', 'caulis_ai_care', 'caulis_garden_node']);
      const payload = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.indexOf('caulis_') === 0 && !skip.has(k) && k.indexOf('caulis_img') !== 0) payload[k] = localStorage.getItem(k);
      }
      let migrateQS = '';
      if (Object.keys(payload).length) {
        try {
          const r = await fetch('https://api.caulis.czeddaru.dev/api/migrate', {
            method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(payload),
          });
          const { token } = await r.json();
          if (token) migrateQS = '_migrate=' + token;
        } catch (e) {}
      }

      const standalone = (window.matchMedia && matchMedia('(display-mode: standalone)').matches) || navigator.standalone === true;
      if (standalone) {
        location.replace('https://caulis.czeddaru.dev/moved.html' + (migrateQS ? '?' + migrateQS : ''));
      } else {
        const path = location.pathname.replace(/^\/Caulis/, '') || '/';
        const sep = location.search ? '&' : '?';
        location.replace('https://caulis.czeddaru.dev' + path + location.search + (migrateQS ? sep + migrateQS : ''));
      }
    })();
  } else if (location.search.indexOf('_migrate=') !== -1) {
    // a human-shared short-token link (moved.html, or Settings > Get
    // migration link) — this runs in a real browser tab on the real domain,
    // not an isolated app container, so a sync XHR here is reliable and
    // still finishes before app.jsx's synchronous useState() reads run
    const params = new URLSearchParams(location.search);
    const token = params.get('_migrate');
    if (token) {
      try {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', 'https://api.caulis.czeddaru.dev/api/migrate/' + encodeURIComponent(token), false);
        xhr.send();
        if (xhr.status < 400) {
          const { payload } = JSON.parse(xhr.responseText);
          for (const k in payload) if (localStorage.getItem(k) === null) localStorage.setItem(k, payload[k]);
        }
      } catch (e) {}
      params.delete('_migrate');
      const qs = params.toString();
      history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
    }
  }
</script>

<script>
  (function() {
    try {
      var stored = localStorage.getItem('caulis_dark');
      var dark = stored != null ? stored === '1' : matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    } catch (e) {}
  })();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --bg: #FAFAF7; --forest: #2D5016; --line: rgba(45,80,22,0.15); }
  :root[data-theme="dark"] { --bg: #111610; --forest: #7EC870; --line: rgba(255,255,255,0.07); }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) { --bg: #111610; --forest: #7EC870; --line: rgba(255,255,255,0.07); }
  }
  html, body { background: var(--bg); -webkit-font-smoothing: antialiased; overflow: hidden; height: 100%; overscroll-behavior: none; user-select: none; -webkit-user-select: none; }
  #root { height: 100%; overflow: hidden; }
  button, [role="button"], a { touch-action: manipulation; }
  input, textarea { user-select: text; -webkit-user-select: text; }
  /* iOS auto-zooms the whole page on focusing any input under 16px, and with
     zoom disabled below there's no way to zoom back out — this floor
     prevents the zoom from triggering at all, on every input in the app. */
  @media (max-width: 900px) {
    input, textarea, select { font-size: 16px !important; }
  }
  input::placeholder { color: rgba(42,42,38,0.34); }
  :root[data-theme="dark"] input::placeholder { color: rgba(220,232,204,0.34); }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) input::placeholder { color: rgba(220,232,204,0.34); }
  }
  @keyframes splash {
    0%   { transform: scale(0.4); opacity: 0; }
    35%  { opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  @keyframes slideUp {
    from { transform: translateY(26px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  @keyframes popUp {
    from { transform: translateY(14px) scale(0.96); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes scanline {
    0%, 100% { top: 6px; }
    50%      { top: calc(100% - 8px); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::highlight(settings-match) { background-color: rgba(122,158,78,0.45); color: var(--forest); }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes bar { 0%, 100% { transform: scaleY(0.4); opacity: 0.5; } 50% { transform: scaleY(1); opacity: 1; } }
  @keyframes doctorIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideFromR { from { transform: translateX(26px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideFromL { from { transform: translateX(-26px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes confettiFall { from { transform: translateY(0) rotate(0deg); opacity: 0.95; } to { transform: translateY(105vh) rotate(340deg); opacity: 0; } }
  html[data-rm="1"] *, html[data-rm="1"] *::before, html[data-rm="1"] *::after {
    animation-duration: 0.001ms !important; animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important; scroll-behavior: auto !important;
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
  #caulis-qr-reader { border: none !important; padding: 0 !important; }
  #caulis-qr-reader video { position:absolute !important; inset:0 !important; width:100% !important; height:100% !important; object-fit:cover !important; }
  #caulis-qr-reader img, #caulis-qr-reader button, #caulis-qr-reader select { display:none !important; }
</style>

<div id="root">
  <!-- static splash — replaced the instant React's render() call fires, so it
       needs no JS of its own and covers the gap while CDN scripts/fonts load -->
  <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg);">
    <svg width="44" height="44" viewBox="0 0 24 24" style="animation:fade 500ms ease"><path d="M12 3C7.6 6.4 5 10.6 5 14.4 5 18.6 8 21 12 21s7-2.4 7-6.6C19 10.6 16.4 6.4 12 3Z" fill="var(--forest)"/></svg>
    <div style="width:26px;height:26px;border-radius:999px;border:2.5px solid var(--line);border-top-color:var(--forest);animation:spin 0.9s linear infinite"></div>
  </div>
</div>
