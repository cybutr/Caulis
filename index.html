<!DOCTYPE html>
<html lang="en">
<head>
<script>
  // Caulis moved off GitHub Pages to its own domain.
  //
  // Regular browser tab: silently redirect, carrying small localStorage
  // settings/credentials along as a one-time query payload so the new
  // origin logs straight back into the same garden (localStorage is
  // origin-scoped, so caulis.czeddaru.dev starts with none of it otherwise).
  // Bulky/re-derivable local caches (plant list, photos, AI cache) are left
  // behind — they resync fresh from the backend once the garden key/password
  // carry over.
  //
  // Installed PWA (standalone): a silent redirect here doesn't fix anything
  // long-term — the home-screen icon's start_url is fixed at install time to
  // the old origin, so it would just show this same page again on every
  // launch. No web API lets a page uninstall itself, so send it to a static
  // page that explains the one-time manual step instead.
  if (location.hostname !== 'caulis.czeddaru.dev') {
    const standalone = (window.matchMedia && matchMedia('(display-mode: standalone)').matches) || navigator.standalone === true;
    if (standalone) {
      location.replace('https://caulis.czeddaru.dev/moved.html');
    } else {
      const skip = new Set(['caulis_plants', 'caulis_queue', 'caulis_ai_care', 'caulis_garden_node']);
      const payload = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.indexOf('caulis_') === 0 && !skip.has(k) && k.indexOf('caulis_img') !== 0) payload[k] = localStorage.getItem(k);
      }
      const path = location.pathname.replace(/^\/Caulis/, '') || '/';
      const sep = location.search ? '&' : '?';
      const migrate = Object.keys(payload).length ? sep + '_migrate=' + encodeURIComponent(JSON.stringify(payload)) : '';
      location.replace('https://caulis.czeddaru.dev' + path + location.search + migrate);
    }
  } else if (location.search.indexOf('_migrate=') !== -1) {
    // one-time import on the real domain — never overwrites a session that
    // already exists here (e.g. someone re-clicking an old shared link)
    const params = new URLSearchParams(location.search);
    const raw = params.get('_migrate');
    if (raw) {
      try {
        const payload = JSON.parse(raw);
        for (const k in payload) if (localStorage.getItem(k) === null) localStorage.setItem(k, payload[k]);
      } catch (e) {}
      params.delete('_migrate');
      const qs = params.toString();
      history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
    }
  }
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: #FAFAF7; -webkit-font-smoothing: antialiased; overflow: hidden; height: 100%; overscroll-behavior: none; user-select: none; -webkit-user-select: none; }
  #root { height: 100%; overflow: hidden; }
  button, [role="button"], a { touch-action: manipulation; }
  input, textarea { user-select: text; -webkit-user-select: text; }
  input::placeholder { color: rgba(42,42,38,0.34); }
  @keyframes splash {
    0%   { transform: scale(0.4); opacity: 0; }
    35%  { opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  @keyframes slideUp {
    from { transform: translateY(26px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  @keyframes popUp {
    from { transform: translateY(14px) scale(0.96); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes scanline {
    0%, 100% { top: 6px; }
    50%      { top: calc(100% - 8px); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes bar { 0%, 100% { transform: scaleY(0.4); opacity: 0.5; } 50% { transform: scaleY(1); opacity: 1; } }
  @keyframes doctorIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideFromR { from { transform: translateX(26px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideFromL { from { transform: translateX(-26px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  html[data-rm="1"] *, html[data-rm="1"] *::before, html[data-rm="1"] *::after {
    animation-duration: 0.001ms !important; animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important; scroll-behavior: auto !important;
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
  #caulis-qr-reader { border: none !important; padding: 0 !important; }
  #caulis-qr-reader video { position:absolute !important; inset:0 !important; width:100% !important; height:100% !important; object-fit:cover !important; }
  #caulis-qr-reader img, #caulis-qr-reader button, #caulis-qr-reader select { display:none !important; }
</style>
