<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caulis — page not found</title>
<meta name="theme-color" content="#2D5016" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#FAFAF7; --panel:#fff; --forest:#2D5016; --sage:#7A9E4E; --brown:#6B4C2A; --ink:#2A2A26; --line:rgba(45,80,22,0.2); }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#111610; --panel:#192115; --forest:#7EC870; --sage:#A0C876; --brown:#C4A882; --ink:#DCE8CC; --line:rgba(255,255,255,0.14); }
  }
  html { color-scheme: light dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:"DM Sans",sans-serif; -webkit-font-smoothing:antialiased;
         min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px; overflow:hidden; position:relative; }
  .card { max-width:400px; text-align:center; position:relative; z-index:2; }
  .pot { position:relative; width:120px; height:120px; margin:0 auto 20px; }
  .pot svg { display:block; margin:0 auto; }
  .wobble { animation:wobble 3.2s ease-in-out infinite; transform-origin:50% 100%; }
  @keyframes wobble { 0%,100% { transform:rotate(-3deg); } 50% { transform:rotate(3deg); } }
  h1 { font-family:"Cormorant Garamond",serif; font-style:italic; font-weight:600; font-size:32px; color:var(--forest); margin-bottom:6px; }
  .code { font-family:ui-monospace,monospace; font-size:13px; color:var(--brown); opacity:0.6; letter-spacing:2px; text-transform:uppercase; margin-bottom:14px; }
  p { font-size:14.5px; line-height:1.65; opacity:0.82; margin-bottom:22px; }
  a.btn { display:inline-flex; align-items:center; gap:8px; background:var(--forest); color:var(--bg); text-decoration:none;
          padding:13px 24px; border-radius:12px; font-weight:600; font-size:14px; }
  .leaf { position:absolute; opacity:0.5; }
  @keyframes drift { 0% { transform:translateY(-10vh) rotate(0deg); opacity:0; } 10% { opacity:0.5; } 100% { transform:translateY(110vh) rotate(220deg); opacity:0; } }
  @media (prefers-reduced-motion: reduce) {
    .wobble { animation:none; }
    .leaf { display:none; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="pot">
    <svg class="wobble" width="120" height="120" viewBox="0 0 120 120" fill="none">
      <path d="M40 78h40l-6 26a6 6 0 01-6 5H52a6 6 0 01-6-5l-6-26Z" fill="var(--brown)"/>
      <path d="M36 78h48l3-10H33l3 10Z" fill="var(--brown)" opacity="0.85"/>
      <path d="M60 78c0-16-14-18-14-34 0-10 8-16 8-16s2 12 10 18c6 4 8 10 8 16 0 9-6 16-12 16Z" fill="var(--sage)" opacity="0.9"/>
      <path d="M60 78c2-14-8-20-8-32 0-8 4-14 4-14s-1 10 6 16c5 4 6 9 6 14 0 8-4 15-8 16Z" fill="var(--forest)"/>
      <circle cx="34" cy="30" r="2" fill="var(--forest)" opacity="0.4"/>
      <circle cx="90" cy="46" r="1.6" fill="var(--forest)" opacity="0.3"/>
    </svg>
  </div>
  <div class="code">404</div>
  <h1>This bed hasn't been planted yet</h1>
  <p>Whatever you were looking for isn't growing at this address. It may have been moved, renamed, or never potted in the first place.</p>
  <a class="btn" href="/">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 3C7.6 6.4 5 10.6 5 14.4 5 18.6 8 21 12 21s7-2.4 7-6.6C19 10.6 16.4 6.4 12 3Z" fill="currentColor"/></svg>
    Back to the garden
  </a>
</div>
<script>
  const emoji = ['🍃','🌿'];
  const reduceMotion = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
  for (let i = 0; i < (reduceMotion ? 0 : 10); i++) {
    const el = document.createElement('div');
    el.className = 'leaf';
    el.textContent = emoji[i % 2];
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.fontSize = (14 + Math.random() * 14) + 'px';
    el.style.animation = `drift ${8 + Math.random() * 6}s linear ${Math.random() * 6}s infinite`;
    document.body.appendChild(el);
  }
</script>
</body>
</html>
