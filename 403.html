<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caulis — access denied</title>
<meta name="theme-color" content="#2D5016" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#FAFAF7; --panel:#fff; --forest:#2D5016; --sage:#7A9E4E; --brown:#6B4C2A; --ink:#2A2A26; --line:rgba(45,80,22,0.2); --needs:#B4472E; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#111610; --panel:#192115; --forest:#7EC870; --sage:#A0C876; --brown:#C4A882; --ink:#DCE8CC; --line:rgba(255,255,255,0.14); --needs:#D45840; }
  }
  html { color-scheme: light dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:"DM Sans",sans-serif; -webkit-font-smoothing:antialiased;
         min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px; }
  .card { max-width:400px; text-align:center; }
  .fence { position:relative; width:120px; height:110px; margin:0 auto 20px; display:flex; align-items:flex-end; justify-content:center; gap:6px; }
  .post { width:9px; height:70px; background:var(--brown); border-radius:3px; opacity:0.85; }
  .post:nth-child(2) { height:86px; }
  .post:nth-child(4) { height:86px; }
  .rail { position:absolute; left:6px; right:6px; height:8px; background:var(--brown); border-radius:3px; opacity:0.7; }
  .rail.top { top:14px; transform:rotate(-2deg); }
  .rail.bottom { bottom:28px; transform:rotate(2deg); }
  .sign { position:absolute; top:-6px; left:50%; transform:translateX(-50%) rotate(-4deg); background:var(--needs); color:#fff;
          font-family:"DM Sans",sans-serif; font-size:10px; font-weight:700; letter-spacing:0.5px; padding:5px 9px; border-radius:4px; }
  h1 { font-family:"Cormorant Garamond",serif; font-style:italic; font-weight:600; font-size:32px; color:var(--forest); margin-bottom:6px; }
  .code { font-family:ui-monospace,monospace; font-size:13px; color:var(--brown); opacity:0.6; letter-spacing:2px; text-transform:uppercase; margin-bottom:14px; }
  p { font-size:14.5px; line-height:1.65; opacity:0.82; margin-bottom:22px; }
  a.btn { display:inline-flex; align-items:center; gap:8px; background:var(--forest); color:var(--bg); text-decoration:none;
          padding:13px 24px; border-radius:12px; font-weight:600; font-size:14px; }
</style>
</head>
<body>
<div class="card">
  <div class="fence">
    <div class="sign">KEEP OUT</div>
    <div class="rail top"></div>
    <div class="rail bottom"></div>
    <div class="post"></div><div class="post"></div><div class="post"></div><div class="post"></div><div class="post"></div>
  </div>
  <div class="code">403</div>
  <h1>This bed is fenced off</h1>
  <p>You don't have permission to dig around here. If you think that's wrong, double-check the link, your garden key, or whatever credential got you this far.</p>
  <a class="btn" href="/">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 3C7.6 6.4 5 10.6 5 14.4 5 18.6 8 21 12 21s7-2.4 7-6.6C19 10.6 16.4 6.4 12 3Z" fill="currentColor"/></svg>
    Back to the garden
  </a>
</div>
</body>
</html>
